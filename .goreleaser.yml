version: 2
builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/rad-security/clawkeeper-mcp-gateway/cmd.version={{.Version}}
      - -X github.com/rad-security/clawkeeper-mcp-gateway/cmd.commit={{.Commit}}
      - -X github.com/rad-security/clawkeeper-mcp-gateway/cmd.date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: rad-security
      name: homebrew-tap
    homepage: "https://clawkeeper.dev/mcp-gateway"
    description: "Open-source MCP gateway with threat detection and policy enforcement"
