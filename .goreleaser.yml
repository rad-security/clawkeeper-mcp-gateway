version: 2
builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/rad-security/clawkeeper-mcp-gateway/cmd.version={{.Version}}
      - -X github.com/rad-security/clawkeeper-mcp-gateway/cmd.commit={{.Commit}}
      - -X github.com/rad-security/clawkeeper-mcp-gateway/cmd.date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

signs:
  - cmd: cosign
    args:
      - sign-blob
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "--yes"
      - "${artifact}"
    artifacts: checksum
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"

